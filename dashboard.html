<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>📊 لوحة تحكم Click && Buy</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* نفس الستايلات اللي عندك */
        body {
            font-family: 'Cairo', Arial;
            background: #f4f4f4;
            direction: rtl;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: right; }
        th { background: #667eea; color: white; }
        .total { background: #28a745; color: white; padding: 10px; border-radius: 10px; display: inline-block; }
        .status-new { background: #ffc107; padding: 3px 8px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 لوحة تحكم الطلبات</h1>
    <div id="total" class="total">جاري التحميل...</div>
    <div id="orders-table">...</div>
</div>

<script>
// ==================== حماية Dashboard ====================
const password = prompt("🔒 أدخل كلمة المرور للدخول إلى لوحة التحكم:");

if(password !== "admin123") {
    document.body.innerHTML = "<h1 style='text-align:center;margin-top:100px;color:red;'>🔒 غير مصرح بالدخول</h1><p style='text-align:center;'>كلمة المرور غير صحيحة</p>";
    throw new Error("Unauthorized");
}

// ==================== Firebase Config ====================
const firebaseConfig = {
    apiKey: "AIzaSyCU8NaYnPFAw1iIYZoX53w6nAeSQgK2LJY",
    authDomain: "click--buy.firebaseapp.com",
    projectId: "click--buy",
    storageBucket: "click--buy.firebasestorage.app",
    messagingSenderId: "23385140961",
    appId: "1:23385140961:web:6bc31308572662ef2151a0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadOrders() {
    const snapshot = await db.collection("orders").orderBy("createdAt", "desc").get();
    const orders = [];
    snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
    
    document.getElementById('total').innerHTML = `📊 ${orders.length} طلب`;
    
    let html = `<table>
        <thead><tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>المقاس</th><th>الولاية</th><th>المجموع</th><th>الحالة</th><th>التاريخ</th></tr></thead>
        <tbody>`;
    
    orders.forEach((order, i) => {
        const date = order.date ? new Date(order.date).toLocaleString('ar-DZ') : '-';
        html += `<tr>
            <td>${i+1}</td>
            <td>${order.name || '-'}</td>
            <td>${order.phone || '-'}</td>
            <td>${order.size || '-'}</td>
            <td>${order.wilaya || '-'}</td>
            <td>${order.total || '-'}</td>
            <td><span class="status-new">${order.status || 'جديد'}</span></td>
            <td>${date}</td>
        </tr>`;
    });
    
    html += `</tbody></table>`;
    document.getElementById('orders-table').innerHTML = html;
}

loadOrders();
</script>
</body>
</html>
