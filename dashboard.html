<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 لوحة تحكم Click && Buy</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            direction: rtl;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #667eea; margin-bottom: 20px; }
        .login-container {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 20px;
            max-width: 400px;
            margin: 100px auto;
        }
        .login-btn {
            background: #4285F4;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            float: left;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: right;
        }
        th { background: #667eea; color: white; position: sticky; top: 0; }
        tr:hover { background: #f5f5f5; }
        .status-new { background: #ffc107; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            flex: 1;
            text-align: center;
        }
        .stat-card .number { font-size: 32px; font-weight: bold; }
        .refresh-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px 0;
        }
        .loading { text-align: center; padding: 50px; color: #666; }
        .user-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCU8NaYnPFAw1iIYZoX53w6nAeSQgK2LJY",
    authDomain: "click--buy.firebaseapp.com",
    projectId: "click--buy",
    storageBucket: "click--buy.firebasestorage.app",
    messagingSenderId: "23385140961",
    appId: "1:23385140961:web:6bc31308572662ef2151a0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const provider = new firebase.auth.GoogleAuthProvider();

// صفحة تسجيل الدخول
function showLogin() {
    document.getElementById('app').innerHTML = `
        <div class="login-container">
            <h2>🔒 لوحة تحكم Click && Buy</h2>
            <p>سجل دخولك بحساب Google للمتابعة</p>
            <button class="login-btn" onclick="login()">🔑 تسجيل الدخول بحساب Google</button>
        </div>
    `;
}

// تسجيل الدخول
async function login() {
    try {
        const result = await auth.signInWithPopup(provider);
        const user = result.user;
        // التأكد أن البريد مصرح له (اختياري)
        const allowedEmails = ["benzait.2006@gmail.com", "ami@gmail.com"]; // ضع بريدك هنا
        if (!allowedEmails.includes(user.email)) {
            await auth.signOut();
            alert("❌ هذا البريد غير مصرح له بالدخول");
            showLogin();
            return;
        }
        loadDashboard();
    } catch (error) {
        console.error(error);
        alert("❌ فشل تسجيل الدخول");
    }
}

// تسجيل الخروج
async function logout() {
    await auth.signOut();
    showLogin();
}

// تحميل لوحة التحكم
async function loadDashboard() {
    const user = auth.currentUser;
    if (!user) {
        showLogin();
        return;
    }
    
    document.getElementById('app').innerHTML = `
        <div class="container">
            <div class="user-info">
                <div>👤 ${user.displayName} (${user.email})</div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل الخروج</button>
            </div>
            <h1>📋 لوحة تحكم الطلبات</h1>
            <button class="refresh-btn" onclick="loadOrders()">🔄 تحديث</button>
            <div class="stats" id="stats">
                <div class="stat-card"><div class="number" id="totalOrders">0</div><div class="label">إجمالي الطلبات</div></div>
                <div class="stat-card"><div class="number" id="todayOrders">0</div><div class="label">طلبات اليوم</div></div>
            </div>
            <div id="ordersTable" class="loading">جاري تحميل الطلبات...</div>
        </div>
    `;
    await loadOrders();
}

// جلب الطلبات
async function loadOrders() {
    const ordersDiv = document.getElementById('ordersTable');
    ordersDiv.innerHTML = '<div class="loading">🔄 جاري التحميل...</div>';
    
    try {
        const snapshot = await db.collection("orders").orderBy("createdAt", "desc").get();
        const orders = [];
        snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
        
        const total = orders.length;
        const today = new Date().toISOString().slice(0, 10);
        const todayCount = orders.filter(o => o.date && o.date.slice(0, 10) === today).length;
        
        document.getElementById('totalOrders').innerHTML = total;
        document.getElementById('todayOrders').innerHTML = todayCount;
        
        if (orders.length === 0) {
            ordersDiv.innerHTML = '<div class="loading">📭 لا توجد طلبات حالياً</div>';
            return;
        }
        
        let html = `树
            <thead>
                <tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>المقاس</th><th>الولاية</th><th>المجموع</th><th>الحالة</th><th>التاريخ</th></tr>
            </thead>
            <tbody>`;
        
        orders.forEach((order, i) => {
            const date = order.date ? new Date(order.date).toLocaleString('ar-DZ') : '-';
            html += `<tr>
                <td>${i+1}</td>
                <td>${order.name || '-'}</td>
                <td>${order.phone || '-'}</td>
                <td>${order.size || '-'}</td>
                <td>${order.wilaya || '-'}</td>
                <td>${order.total || '-'}</td>
                <td><span class="status-new">${order.status || 'جديد'}</span></td>
                <td>${date}</td>
            </tr>`;
        });
        
        html += `</tbody>树`;
        ordersDiv.innerHTML = html;
        
    } catch (error) {
        ordersDiv.innerHTML = `<div class="loading">❌ خطأ: ${error.message}</div>`;
    }
}

// مراقبة حالة تسجيل الدخول
auth.onAuthStateChanged(user => {
    if (user) {
        loadDashboard();
    } else {
        showLogin();
    }
});
</script>
</body>
</html>
