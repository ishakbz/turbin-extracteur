<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 لوحة تحكم Click && Buy</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: #f4f4f4;
            direction: rtl;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 14px;
            opacity: 0.9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: right;
        }
        th {
            background: #667eea;
            color: white;
            position: sticky;
            top: 0;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .status-new {
            background: #ffc107;
            color: #333;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }
        .refresh-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 16px;
        }
        .refresh-btn:hover {
            background: #218838;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #666;
        }
        @media (max-width: 768px) {
            th, td {
                padding: 8px;
                font-size: 12px;
            }
            .stat-card .number {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 لوحة تحكم الطلبات - Click && Buy</h1>
    <button class="refresh-btn" onclick="loadOrders()">🔄 تحديث</button>
    
    <div class="stats" id="stats">
        <div class="stat-card"><div class="number" id="totalOrders">0</div><div class="label">إجمالي الطلبات</div></div>
        <div class="stat-card"><div class="number" id="todayOrders">0</div><div class="label">طلبات اليوم</div></div>
    </div>
    
    <div id="ordersTable" class="loading">جاري تحميل الطلبات...</div>
</div>

<script>
// إعدادات Firebase (نفس اللي عندك في الموقع الرئيسي)
const firebaseConfig = {
    apiKey: "AIzaSyCU8NaYnPFAw1iIYZoX53w6nAeSQgK2LJY",
    authDomain: "click--buy.firebaseapp.com",
    databaseURL: "https://click--buy-default-rtdb.firebaseio.com",
    projectId: "click--buy",
    storageBucket: "click--buy.firebasestorage.app",
    messagingSenderId: "23385140961",
    appId: "1:23385140961:web:6bc31308572662ef2151a0",
    measurementId: "G-4JEM92MQ7D"
};

// تهيئة Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loadOrders() {
    const ordersDiv = document.getElementById('ordersTable');
    ordersDiv.innerHTML = '<div class="loading">🔄 جاري التحميل...</div>';
    
    try {
        const snapshot = await db.collection("orders").orderBy("createdAt", "desc").get();
        const orders = [];
        snapshot.forEach(doc => {
            orders.push({ id: doc.id, ...doc.data() });
        });
        
        // إحصائيات
        const total = orders.length;
        const today = new Date().toISOString().slice(0, 10);
        const todayCount = orders.filter(o => o.date && o.date.slice(0, 10) === today).length;
        
        document.getElementById('totalOrders').innerHTML = total;
        document.getElementById('todayOrders').innerHTML = todayCount;
        
        if (orders.length === 0) {
            ordersDiv.innerHTML = '<div class="loading">📭 لا توجد طلبات حالياً</div>';
            return;
        }
        
        // عرض الجدول
        let html = `<table>
            <thead>
                <tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>المقاس</th><th>السعر</th><th>الولاية</th><th>البلدية</th><th>المجموع</th><th>الحالة</th><th>التاريخ</th></tr>
            </thead>
            <tbody>`;
        
        orders.forEach((order, index) => {
            const date = order.date ? new Date(order.date).toLocaleString('ar-DZ') : '-';
            html += `<tr>
                <td>${index + 1}</td>
                <td>${order.name || '-'}</td>
                <td>${order.phone || '-'}</td>
                <td>${order.size || '-'}</td>
                <td>${order.price || '-'}</td>
                <td>${order.wilaya || '-'}</td>
                <td>${order.baladia || '-'}</td>
                <td>${order.total || '-'}</td>
                <td><span class="status-new">${order.status || 'جديد'}</span></td>
                <td>${date}</td>
             </tr>`;
        });
        
        html += `</tbody></table>`;
        ordersDiv.innerHTML = html;
        
    } catch (error) {
        console.error("خطأ:", error);
        ordersDiv.innerHTML = `<div class="loading">❌ خطأ في تحميل الطلبات: ${error.message}</div>`;
    }
}

// تحميل الطلبات عند فتح الصفحة
loadOrders();
</script>
</body>
</html>
