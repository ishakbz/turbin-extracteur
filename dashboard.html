<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>📊 لوحة تحكم Click && Buy</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            direction: rtl;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container, .dashboard-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .dashboard-container {
            max-width: 1400px;
            width: 95%;
            margin: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            width: 100%;
        }
        button:hover { opacity: 0.9; }
        .error { color: red; margin-top: 10px; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: right;
        }
        th { background: #667eea; color: white; }
        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #667eea;
            color: white;
            padding: 20px;
            border-radius: 15px;
            flex: 1;
            text-align: center;
        }
        .stat-card .number { font-size: 32px; font-weight: bold; }
        .refresh-btn { background: #28a745; width: auto; display: inline-block; margin: 10px 0; }
        .logout-btn { background: #dc3545; width: auto; float: left; }
        .loading { text-align: center; padding: 50px; color: #666; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCU8NaYnPFAw1iIYZoX53w6nAeSQgK2LJY",
    authDomain: "click--buy.firebaseapp.com",
    projectId: "click--buy",
    storageBucket: "click--buy.firebasestorage.app",
    messagingSenderId: "23385140961",
    appId: "1:23385140961:web:6bc31308572662ef2151a0"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// عرض صفحة تسجيل الدخول
function showLogin(errorMsg = '') {
    document.getElementById('app').innerHTML = `
        <div class="login-container">
            <h2>🔐 لوحة التحكم</h2>
            <p>أدخل بياناتك للدخول</p>
            <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email">
            <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
            <button onclick="login()">🚪 تسجيل الدخول</button>
            ${errorMsg ? `<div class="error">❌ ${errorMsg}</div>` : ''}
        </div>
    `;
}

// تسجيل الدخول
async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    if (!email || !password) {
        showLogin('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
        return;
    }
    
    try {
        await auth.signInWithEmailAndPassword(email, password);
        loadDashboard();
    } catch (error) {
        let msg = 'فشل تسجيل الدخول';
        if (error.code === 'auth/user-not-found') msg = 'المستخدم غير موجود';
        else if (error.code === 'auth/wrong-password') msg = 'كلمة المرور غير صحيحة';
        else if (error.code === 'auth/invalid-email') msg = 'البريد الإلكتروني غير صحيح';
        showLogin(msg);
    }
}

// تسجيل الخروج
async function logout() {
    await auth.signOut();
    showLogin();
}

// تحميل لوحة التحكم
async function loadDashboard() {
    const user = auth.currentUser;
    if (!user) {
        showLogin();
        return;
    }
    
    document.getElementById('app').innerHTML = `
        <div class="dashboard-container">
            <div class="header">
                <div>👋 مرحباً ${user.email}</div>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل الخروج</button>
            </div>
            <h1>📋 لوحة تحكم الطلبات</h1>
            <button class="refresh-btn" onclick="loadOrders()">🔄 تحديث</button>
            <div class="stats" id="stats">
                <div class="stat-card"><div class="number" id="totalOrders">0</div><div class="label">إجمالي الطلبات</div></div>
                <div class="stat-card"><div class="number" id="todayOrders">0</div><div class="label">طلبات اليوم</div></div>
            </div>
            <div id="ordersTable" class="loading">جاري تحميل الطلبات...</div>
        </div>
    `;
    await loadOrders();
}

// جلب الطلبات
async function loadOrders() {
    const ordersDiv = document.getElementById('ordersTable');
    ordersDiv.innerHTML = '<div class="loading">🔄 جاري التحميل...</div>';
    
    try {
        const snapshot = await db.collection("orders").orderBy("createdAt", "desc").get();
        const orders = [];
        snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
        
        const total = orders.length;
        const today = new Date().toISOString().slice(0, 10);
        const todayCount = orders.filter(o => o.date && o.date.slice(0, 10) === today).length;
        
        document.getElementById('totalOrders').innerHTML = total;
        document.getElementById('todayOrders').innerHTML = todayCount;
        
        if (orders.length === 0) {
            ordersDiv.innerHTML = '<div class="loading">📭 لا توجد طلبات حالياً</div>';
            return;
        }
        
        let html = `表格
            <thead>
                <tr><th>#</th><th>الاسم</th><th>الهاتف</th><th>المقاس</th><th>الولاية</th><th>المجموع</th><th>التاريخ</th>〈/tr>
            </thead>
            <tbody>`;
        
        orders.forEach((order, i) => {
            const date = order.date ? new Date(order.date).toLocaleString('ar-DZ') : '-';
            html += `<tr>
                <td>${i+1}〈/td>
                <td>${order.name || '-'}〈/td>
                <td>${order.phone || '-'}〈/td>
                <td>${order.size || '-'}〈/td>
                <td>${order.wilaya || '-'}〈/td>
                <td>${order.total || '-'}〈/td>
                <td>${date}〈/td>
            〈/tr>`;
        });
        
        html += `</tbody>${'</table>'}`;
        ordersDiv.innerHTML = html;
        
    } catch (error) {
        ordersDiv.innerHTML = `<div class="loading">❌ خطأ: ${error.message}</div>`;
    }
}

// مراقبة حالة تسجيل الدخول
auth.onAuthStateChanged(user => {
    if (user) {
        loadDashboard();
    } else {
        showLogin();
    }
});
</script>
</body>
</html>
