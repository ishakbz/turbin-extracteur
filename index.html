function updateTotal(){
let price=parseInt(document.getElementById("price").innerText)||0;
let type=document.getElementById("type").value;
let ship= type=="home" ? parseInt(document.getElementById("home").innerText)||0 : parseInt(document.getElementById("desk").innerText)||0;
document.getElementById("total").innerText=price+ship;
}
document.getElementById("size").onchange=function(){
    let opt = this.options[this.selectedIndex];
    document.getElementById("price").innerText = opt.dataset.price || "-";

    let s = this.value; // هاد s هو li ghadi nsta3ml

    if(images[s]){
        document.getElementById("img-top").src = images[s].top;
        document.getElementById("img-bottom").src = images[s].bottom;
    }

    updateTotal();

    const area = {
      "100mm": "8-16m²",
      "125mm": "10-20m²",
      "150mm": "18-36m²",
      "200mm": "25-50m²",
      "250mm": "55-130m²",
      "315mm": "90-200m²"
    };

    // **استعمال s بدل size**
    if(area[s]){
        document.getElementById("area").innerText = area[s];
    } else {
        document.getElementById("area").innerText = "-";
    }
};

document.getElementById("type").onchange = updateTotal;

document.getElementById("wilaya").onchange=function(){
let w=this.value;

if(livraison[w]){
document.getElementById("home").innerText=livraison[w].home;
document.getElementById("desk").innerText=livraison[w].desk;
}

let list=document.getElementById("baladia-list");
list.innerHTML="";
if(baladiat[w]){
baladiat[w].forEach(b=>{
let op=document.createElement("option");
op.value=b;
list.appendChild(op);
});
}

updateTotal();
};
// إرسال واتساب
function send(){
    let size = document.getElementById("size").value;
    let price = document.getElementById("price").innerText;
    let wilaya = document.getElementById("wilaya").value;
    let baladia = document.getElementById("baladia").value;
    let type = document.getElementById("type").value;
    let name = document.getElementById("name").value;
    let clientPhone = document.getElementById("phone").value; // رقم العميل

    if(!size || !wilaya || !baladia || !name || !clientPhone){
        alert("عمر جميع المعلومات");
        return;
    }

    let ship = type=="home" ? document.getElementById("home").innerText : document.getElementById("desk").innerText;
    let total = parseInt(price) + parseInt(ship);

    // رسالة جاهزة
    let msg = `طلب جديد:
المقاس: ${size}
السعر: ${price} دج
الولاية: ${wilaya}
البلدية: ${baladia}
نوع التوصيل: ${type=="home"?"منزل":"مكتب"}
سعر التوصيل: ${ship} دج
المجموع: ${total} دج
الاسم: ${name}
رقم الهاتف: ${clientPhone}`;

  
    let vendeurNumber = "213673699621";

    // فتح WhatsApp conversation مباشرة عند البائع
    window.open(`https://wa.me/${vendeurNumber}?text=${encodeURIComponent(msg)}`, "_blank");
}
