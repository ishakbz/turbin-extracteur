<!DOCTYPE html>

<style>

}

}

</style>
</head>

<p>🏢 توصيل مكتب: <span id="desk">-</span> دج</p>


<label>نوع التوصيل</label>
<select id="type">
<option value="home">منزل</option>
<option value="desk">مكتب</option>
</select>


<input id="name" placeholder="الاسم الكامل">
<input id="baladia" placeholder="البلدية">
<input id="phone" placeholder="رقم الهاتف">

<button onclick="send()">إرسال الطلب عبر واتساب</button>

</div>

<script>


const images={
"100mm":{top:"images/100mm.jpg",bottom:"images/100mm-2.jpg"},
"125mm":{top:"images/125mm.jpg",bottom:"images/125mm-2.jpg"},
"150mm":{top:"images/150mm.jpg",bottom:"images/150mm-2.jpg"},
"200mm":{top:"images/200mm.jpg",bottom:"images/200mm-2.jpg"},
"250mm":{top:"images/250mm.jpg",bottom:"images/250mm-2.jpg"},
"315mm":{top:"images/315mm.jpg",bottom:"images/315mm-2.jpg"}
};


const livraison = {
"01 - أدرار":{home:1100,desk:600},
"02 - الشلف":{home:700,desk:400},
"03 - الأغواط":{home:900,desk:500},
"04 - أم البواقي":{home:800,desk:400},
"05 - باتنة":{home:800,desk:400},
"06 - بجاية":{home:700,desk:400},
"07 - بسكرة":{home:900,desk:500},
"08 - بشار":{home:1100,desk:600},
"09 - البليدة":{home:500,desk:250},
"10 - البويرة":{home:650,desk:400},
"11 - تمنراست":{home:1300,desk:800},
"12 - تبسة":{home:800,desk:500},
"13 - تلمسان":{home:800,desk:400},
"14 - تيارت":{home:800,desk:400},
"15 - تيزي وزو":{home:650,desk:400},
"16 - الجزائر":{home:400,desk:200},
"17 - الجلفة":{home:900,desk:500},
"18 - جيجل":{home:700,desk:400},
"19 - سطيف":{home:700,desk:400},
"20 - سعيدة":{home:800,desk:400},
"21 - سكيكدة":{home:700,desk:400},
"22 - سيدي بلعباس":{home:700,desk:400},
"23 - عنابة":{home:700,desk:400},
"24 - قالمة":{home:800,desk:400},
"25 - قسنطينة":{home:700,desk:400},
"26 - المدية":{home:600,desk:400},
"27 - مستغانم":{home:700,desk:400},
"28 - المسيلة":{home:800,desk:500},
"29 - معسكر":{home:700,desk:400},
"30 - ورقلة":{home:1000,desk:500},
"31 - وهران":{home:700,desk:400},
"32 - البيض":{home:900,desk:500},
"33 - إليزي":{home:1300,desk:800},
"34 - برج بوعريريج":{home:700,desk:400},
"35 - بومرداس":{home:600,desk:300},
"36 - الطارف":{home:700,desk:400},
"37 - تندوف":{home:1300,desk:800},
"38 - تيسمسيلت":{home:800,desk:400},
"39 - الوادي":{home:900,desk:500},
"40 - خنشلة":{home:800,desk:400},
"41 - سوق أهراس":{home:800,desk:400},
"42 - تيبازة":{home:600,desk:300},
"43 - ميلة":{home:700,desk:400},
"44 - عين الدفلى":{home:700,desk:400},
"45 - النعامة":{home:900,desk:500},
"46 - عين تموشنت":{home:700,desk:400},
"47 - غرداية":{home:900,desk:500},
"48 - غليزان":{home:700,desk:400},
"49 - تيميمون":{home:1100,desk:600},
"50 - برج باجي مختار":{home:1300,desk:800},
"51 - أولاد جلال":{home:900,desk:500},
"52 - بني عباس":{home:1100,desk:600},
"53 - عين صالح":{home:1200,desk:700},
"54 - عين قزام":{home:1300,desk:800},
"55 - تقرت":{home:900,desk:500},
"56 - جانت":{home:1300,desk:800},
"57 - المغير":{home:900,desk:500},
"58 - المنيعة":{home:1000,desk:600}
};


document.getElementById("size").onchange=function(){
let opt=this.options[this.selectedIndex];
document.getElementById("price").innerText=opt.dataset.price||"-";

let size=this.value;
if(images[size]){
document.getElementById("img-top").src=images[size].top;
document.getElementById("img-bottom").src=images[size].bottom;
}
}


document.getElementById("wilaya").onchange=function(){
let w=this.value;
if(livraison[w]){
document.getElementById("home").innerText=livraison[w].home;
document.getElementById("desk").innerText=livraison[w].desk;
}
}

// إرسال واتساب
function send(){
    let size = document.getElementById("size").value;
    let price = document.getElementById("price").innerText;
    let wilaya = document.getElementById("wilaya").value;
    let baladia = document.getElementById("baladia").value;
    let type = document.getElementById("type").value;
    let name = document.getElementById("name").value;
    let clientPhone = document.getElementById("phone").value; // رقم العميل

    if(!size || !wilaya || !baladia || !name || !clientPhone){
        alert("عمر جميع المعلومات");
        return;
    }

    let ship = type=="home" ? document.getElementById("home").innerText : document.getElementById("desk").innerText;
    let total = parseInt(price) + parseInt(ship);

    // رسالة جاهزة
    let msg = `طلب جديد:
المقاس: ${size}
السعر: ${price} دج
الولاية: ${wilaya}
البلدية: ${baladia}
نوع التوصيل: ${type=="home"?"منزل":"مكتب"}
سعر التوصيل: ${ship} دج
المجموع: ${total} دج
الاسم: ${name}
رقم الهاتف: ${clientPhone}`;

    // رقم البائع الثابت بصيغة دولية
    let vendeurNumber = "213778565501"; // <-- هنا الرقم ديالك

    // فتح WhatsApp conversation مباشرة عند البائع
    window.open(`https://wa.me/${vendeurNumber}?text=${encodeURIComponent(msg)}`, "_blank");
}
</script>
</body>
